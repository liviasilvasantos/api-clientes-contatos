version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: api-clientes-contatos-db
    environment:
      - POSTGRES_DB=clientes_contatos_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - nubank_challenge
  adminer:
    image: adminer
    container_name: adminer
    ports:
      - 9090:8080
    networks:
      - nubank_challenge
    depends_on:
      - postgres
networks:
  nubank_challenge:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
          gateway: 10.0.0.1
volumes:
  pgdata:
